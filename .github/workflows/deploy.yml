name: CI/CD Pipeline a GCP

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código
      uses: actions/checkout@v3

    - name: Configurar Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compilar con Gradle
      run: ./gradlew build

    - name: Autenticar en Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Construir y Subir Imagen Docker a GCP
      run: |
        docker build -t tu-region-docker.pkg.dev/tu-proyecto-gcp/mi-repo/mi-app-java:latest .
        docker push tu-region-docker.pkg.dev/tu-proyecto-gcp/mi-repo/mi-app-java:latest

    - name: Desplegar en Kubernetes (GKE)
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
