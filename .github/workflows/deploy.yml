name: Deploy Java App to GKE

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: 'projects/278230809043/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-robot@project-2e1b8850-8d2e-4248-822.iam.gserviceaccount.com'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # CORRECCIÓN AQUÍ: Damos permiso de ejecución antes de compilar
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # Construcción y subida de la imagen Docker
      - name: Build and Push Docker Image
        run: |
          # Reemplacé la variable por tu ID de proyecto directo para evitar la doble barra
          sudo docker build -t us-central1-docker.pkg.dev/project-2e1b8850-8d2e-4248-822/my-repository/my-app:latest .
          sudo docker push us-central1-docker.pkg.dev/project-2e1b8850-8d2e-4248-822/my-repository/my-app:latest

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v1
        with:
          cluster_name: 'my-first-cluster'
          location: 'us-central1'

      - name: Deploy to GKE
        run: kubectl rollout restart deployment/my-app-deployment